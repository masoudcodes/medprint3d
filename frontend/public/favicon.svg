<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue background -->
  <rect width="64" height="64" rx="13" fill="#1677ff"/>

  <!-- Back layer (faintest, top-right) -->
  <rect x="22" y="10" width="32" height="32" rx="4"
    fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.38)" stroke-width="3.5"/>

  <!-- Middle layer -->
  <rect x="16" y="16" width="32" height="32" rx="4"
    fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.68)" stroke-width="3.5"/>

  <!-- Front layer (bottom-left, brightest) -->
  <rect x="10" y="22" width="32" height="32" rx="4"
    fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="3.5"/>

  <!-- ECG heartbeat inside front square (x:10–42, y:22–54, centre y=38) -->
  <polyline points="13,38 18,38 21,27 25,51 28,38 39,38"
    fill="none" stroke="white" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
