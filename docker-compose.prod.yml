services:
  db:
    image: postgres:15
    container_name: medical-3d-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-medical3dprint}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medical-3d-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: medical-3d-backend
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: config.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-medical3dprint}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      REDIS_URL: redis://redis:6379/0
      SCAN_RETENTION_DAYS: ${SCAN_RETENTION_DAYS:-120}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: medical-3d-celery
    restart: always
    command: celery -A config worker -l info
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: config.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-medical3dprint}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      SCAN_RETENTION_DAYS: ${SCAN_RETENTION_DAYS:-120}
    volumes:
      - media_data:/app/media
    depends_on:
      - db
      - redis
      - backend

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: medical-3d-celery-beat
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: config.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-medical3dprint}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      SCAN_RETENTION_DAYS: ${SCAN_RETENTION_DAYS:-120}
    depends_on:
      - db
      - redis
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: medical-3d-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  default:
    name: medical-3d-network
